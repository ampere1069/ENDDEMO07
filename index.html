
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f8fbff">
  <meta name="description" content="Silent Horizon white premium presentation ending page.">
  <title>感謝聆聽 | Thank You - GV63</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+TC:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fbff;
      --ink: #07111f;
      --ink-soft: #51627a;
      --ink-faint: #8b9bb1;
      --accent: #0098ff;
      --accent-soft: rgba(0, 152, 255, 0.18);
      --line: rgba(7, 17, 31, 0.1);
      --glass: rgba(255, 255, 255, 0.64);
      --font-cjk: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
      --font-display: "Bebas Neue", "Arial Narrow", sans-serif;
      --font-mono: "Space Mono", monospace;
    }

    html { font-size: 16px; }
    @media (max-width: 1920px) { html { font-size: 0.833333vw; } }
    @media (max-width: 1440px) { html { font-size: 1.111111vw; } }
    @media (max-width: 1024px) { html { font-size: 1.5625vw; } }
    @media (max-width: 640px) { html { font-size: 4.444444vw; } }

    *,
    *::before,
    *::after { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      min-height: 100dvh;
      color: var(--ink);
      font-family: var(--font-cjk);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.98) 0 20%, rgba(244, 250, 255, 0.9) 42%, transparent 68%),
        radial-gradient(circle at 82% 18%, rgba(110, 223, 255, 0.2), transparent 26rem),
        radial-gradient(circle at 12% 86%, rgba(0, 152, 255, 0.12), transparent 24rem),
        linear-gradient(135deg, #ffffff 0%, #f7fbff 52%, #eef7ff 100%);
    }

    #field,
    .paper,
    .orb,
    .noise,
    .frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #field {
      z-index: 0;
      display: block;
      opacity: 0.98;
    }

    .paper {
      z-index: 1;
      opacity: 0.34;
      background-image:
        linear-gradient(rgba(7, 17, 31, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(7, 17, 31, 0.05) 1px, transparent 1px);
      background-size: 4rem 4rem;
      mask-image: radial-gradient(ellipse 72% 58% at 50% 50%, black, transparent 76%);
    }

    .orb {
      z-index: 2;
      display: grid;
      place-items: center;
    }

    .orb::before,
    .orb::after {
      width: min(52vw, 52rem);
      aspect-ratio: 1;
      content: "";
      border-radius: 50%;
      border: 1px solid rgba(0, 152, 255, 0.18);
      background:
        radial-gradient(circle at 50% 50%, transparent 0 48%, rgba(0, 152, 255, 0.08) 49%, transparent 52%),
        conic-gradient(from 120deg, transparent, rgba(0, 152, 255, 0.18), transparent 34%, rgba(0, 152, 255, 0.12), transparent 68%);
      filter: blur(0.2px);
      transform: scale(var(--orb-scale, 0.88)) rotate(var(--orb-rotate, 0deg));
      opacity: var(--orb-alpha, 0.72);
      will-change: transform, opacity;
    }

    .orb::after {
      position: absolute;
      width: min(34vw, 34rem);
      opacity: 0.36;
      transform: scale(var(--orb-small-scale, 0.72)) rotate(calc(var(--orb-rotate, 0deg) * -1));
    }

    .frame {
      z-index: 6;
      inset: clamp(0.9rem, 1.4vw, 1.65rem);
      width: auto;
      height: auto;
      border: 1px solid rgba(7, 17, 31, 0.12);
      border-radius: 2rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .noise {
      z-index: 8;
      opacity: 0.028;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.78'/%3E%3C/svg%3E");
    }

    main {
      position: relative;
      z-index: 4;
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 100dvh;
      padding: clamp(2.2rem, 5vw, 6rem);
      text-align: center;
      isolation: isolate;
    }

    .brand-line {
      position: absolute;
      top: clamp(2.4rem, 5vw, 5rem);
      left: 50%;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      min-height: 2.8rem;
      padding: 0.66rem 1rem;
      border: 1px solid rgba(0, 152, 255, 0.2);
      border-radius: 999px;
      color: var(--ink-soft);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: var(--glass);
      box-shadow: 0 1.2rem 4rem rgba(35, 109, 174, 0.12);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      transform: translateX(-50%);
      will-change: transform, opacity;
    }

    .brand-line::before {
      width: 0.5rem;
      height: 0.5rem;
      content: "";
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 1.4rem rgba(0, 152, 255, 0.9);
    }

    .title-wrap {
      display: grid;
      justify-items: center;
      gap: clamp(0.9rem, 1.7vw, 1.8rem);
      transform: translateY(1.2rem);
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-family: var(--font-cjk);
      font-size: clamp(5.4rem, 12.2vw, 13.8rem);
      font-weight: 900;
      line-height: 0.98;
      letter-spacing: -0.055em;
      text-wrap: nowrap;
      filter:
        drop-shadow(0 1.5rem 3.2rem rgba(64, 117, 168, 0.14))
        drop-shadow(0 0.2rem 0 rgba(255, 255, 255, 0.8));
    }

    .char {
      display: inline-block;
      padding: 0 0.018em;
      background: linear-gradient(180deg, #07111f 0%, #10233a 58%, #365f86 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      transform-origin: 50% 72%;
      will-change: transform, opacity, filter;
    }

    .hairline {
      width: min(36rem, 72vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 152, 255, 0.74), rgba(7, 17, 31, 0.12), transparent);
      transform-origin: center;
      will-change: transform, opacity;
    }

    .en-title {
      margin: 0;
      color: var(--accent);
      font-family: var(--font-display);
      font-size: clamp(4rem, 8vw, 8.4rem);
      line-height: 0.85;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 1.2rem 2.8rem rgba(0, 152, 255, 0.16);
      will-change: transform, opacity, letter-spacing;
    }

    .footer-label {
      position: absolute;
      left: 50%;
      bottom: clamp(2.2rem, 4.5vw, 4.8rem);
      color: var(--ink-faint);
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transform: translateX(-50%);
      will-change: transform, opacity;
    }

    .is-preload .brand-line,
    .is-preload .char,
    .is-preload .hairline,
    .is-preload .en-title,
    .is-preload .footer-label {
      visibility: hidden;
    }

    @keyframes fallback-loop {
      0%, 8%, 100% { opacity: 0; transform: translate3d(0, 1.8rem, 0) scale(0.97); filter: blur(0.8rem); }
      24%, 80% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); filter: blur(0); }
      92% { opacity: 0; transform: translate3d(0, -1rem, 0) scale(0.98); filter: blur(0.5rem); }
    }

    .fallback-loop .brand-line,
    .fallback-loop .char,
    .fallback-loop .hairline,
    .fallback-loop .en-title,
    .fallback-loop .footer-label {
      animation: fallback-loop 10.8s cubic-bezier(0.16, 1, 0.3, 1) infinite both;
    }

    @media (max-width: 760px) {
      main {
        padding: max(2rem, env(safe-area-inset-top)) 1.25rem max(2rem, env(safe-area-inset-bottom));
      }

      .brand-line {
        top: 2rem;
        width: calc(100vw - 3.2rem);
        justify-content: center;
        font-size: 0.56rem;
        letter-spacing: 0.11em;
      }

      .title-wrap {
        gap: 0.9rem;
        transform: translateY(0.6rem);
      }

      h1 {
        font-size: clamp(3.8rem, 17vw, 5.5rem);
        letter-spacing: -0.08em;
      }

      .en-title {
        font-size: clamp(2.8rem, 17vw, 4.4rem);
        letter-spacing: 0.09em;
      }

      .hairline {
        width: 86vw;
      }

      .footer-label {
        width: 100%;
        padding: 0 1rem;
        font-size: 0.52rem;
        letter-spacing: 0.12em;
      }

      .orb::before {
        width: 92vw;
      }

      .orb::after {
        width: 62vw;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .brand-line,
      .char,
      .hairline,
      .en-title,
      .footer-label {
        visibility: visible !important;
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
        animation: none !important;
      }

      .brand-line,
      .footer-label {
        transform: translateX(-50%) !important;
      }

      .hairline {
        transform: scaleX(1) !important;
      }
    }
  </style>
</head>
<body class="is-preload">
  <canvas id="field" aria-hidden="true"></canvas>
  <div class="paper" aria-hidden="true"></div>
  <div class="orb" aria-hidden="true"></div>
  <div class="frame" aria-hidden="true"></div>

  <main>
    <p class="brand-line">Final moment</p>
    <section class="title-wrap" aria-labelledby="title">
      <h1 id="title" aria-label="感謝聆聽">
        <span class="char" aria-hidden="true">感</span><span class="char" aria-hidden="true">謝</span><span class="char" aria-hidden="true">聆</span><span class="char" aria-hidden="true">聽</span>
      </h1>
      <div class="hairline" aria-hidden="true"></div>
      <p class="en-title" lang="en">Thank You</p>
    </section>
    <p class="footer-label">2026 Presentation Finale</p>
  </main>

  <div class="noise" aria-hidden="true"></div>

  <script>
    (() => {
      "use strict";

      const canvas = document.querySelector("#field");
      const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      let started = false;
      let program = null;
      let uResolution = null;
      let uTime = null;

      function compile(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          gl.deleteShader(shader);
          return null;
        }
        return shader;
      }

      function initWebGL() {
        if (!gl) return false;
        const vertexSource = "attribute vec2 p; void main(){gl_Position=vec4(p,0.0,1.0);}";
        const fragmentSource = [
          "precision mediump float;",
          "uniform vec2 resolution;",
          "uniform float time;",
          "float ring(vec2 uv, float r, float w){",
          "  return smoothstep(w, 0.0, abs(length(uv)-r));",
          "}",
          "void main(void){",
          "  vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);",
          "  float t = time * 0.12;",
          "  float a = atan(uv.y, uv.x);",
          "  float d = length(uv);",
          "  float wave = 0.0;",
          "  for(int i=0; i<8; i++){",
          "    float fi = float(i);",
          "    float r = 0.18 + fi * 0.12 + sin(t + fi) * 0.012;",
          "    wave += ring(uv, r, 0.006 + fi * 0.001) * (0.12 - fi * 0.009);",
          "  }",
          "  float sweep = pow(abs(cos(a * 3.0 - t * 0.9)), 14.0) * smoothstep(1.3, 0.0, d) * 0.12;",
          "  float horizon = exp(-abs(uv.y + sin(uv.x * 2.2 + t) * 0.018) * 18.0) * 0.055;",
          "  vec3 base = vec3(0.975, 0.99, 1.0);",
          "  vec3 cyan = vec3(0.0, 0.55, 1.0);",
          "  vec3 pearl = vec3(0.75, 0.94, 1.0);",
          "  vec3 color = base + cyan * wave + pearl * sweep + cyan * horizon;",
          "  gl_FragColor = vec4(color, 1.0);",
          "}"
        ].join("\n");
        const vs = compile(gl.VERTEX_SHADER, vertexSource);
        const fs = compile(gl.FRAGMENT_SHADER, fragmentSource);
        if (!vs || !fs) return false;
        program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) return false;
        gl.useProgram(program);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
        const position = gl.getAttribLocation(program, "p");
        gl.enableVertexAttribArray(position);
        gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);
        uResolution = gl.getUniformLocation(program, "resolution");
        uTime = gl.getUniformLocation(program, "time");
        return true;
      }

      function resize() {
        if (!gl || !uResolution) return;
        const dpr = Math.min(window.devicePixelRatio || 1, 1.75);
        canvas.width = Math.round(window.innerWidth * dpr);
        canvas.height = Math.round(window.innerHeight * dpr);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.uniform2f(uResolution, canvas.width, canvas.height);
      }

      function render(time) {
        if (gl && program && !reduceMotion.matches) {
          gl.uniform1f(uTime, time * 0.001);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }
        requestAnimationFrame(render);
      }

      function reveal() {
        if (started) return;
        started = true;
        document.body.classList.remove("is-preload");

        if (!window.gsap || reduceMotion.matches) {
          document.body.classList.add("fallback-loop");
          return;
        }

        gsap.registerPlugin(ScrollTrigger);
        gsap.set(".brand-line", { autoAlpha: 0, y: -12, xPercent: -50 });
        gsap.set(".char", { autoAlpha: 0, yPercent: 72, scale: 0.94, filter: "blur(18px)" });
        gsap.set(".hairline", { autoAlpha: 0, scaleX: 0 });
        gsap.set(".en-title", { autoAlpha: 0, y: 18, letterSpacing: "0.06em" });
        gsap.set(".footer-label", { autoAlpha: 0, y: 12, xPercent: -50 });

        window.__endingLoopCount = 0;
        const tl = gsap.timeline({
          repeat: -1,
          repeatDelay: 0.28,
          defaults: { ease: "expo.out" },
          onRepeat: () => {
            window.__endingLoopCount += 1;
          }
        });
        window.__endingTimeline = tl;

        tl
          .addLabel("in", 0)
          .to(".brand-line", { autoAlpha: 1, y: 0, duration: 0.72 }, "in")
          .to(".orb", { "--orb-scale": 1.04, "--orb-small-scale": 1.05, "--orb-rotate": "26deg", "--orb-alpha": 0.82, duration: 2.1, ease: "sine.inOut" }, "in")
          .to(".char", {
            autoAlpha: 1,
            yPercent: 0,
            scale: 1,
            filter: "blur(0px)",
            duration: 1.02,
            stagger: 0.085,
            ease: "back.out(1.2)"
          }, "in+=0.18")
          .to(".hairline", { autoAlpha: 1, scaleX: 1, duration: 0.74, ease: "power3.inOut" }, "in+=0.72")
          .to(".en-title", { autoAlpha: 1, y: 0, letterSpacing: "0.26em", duration: 0.9 }, "in+=0.78")
          .to(".footer-label", { autoAlpha: 1, y: 0, duration: 0.58 }, "in+=1.05")
          .to({}, { duration: 3.8 })
          .addLabel("out")
          .to(".footer-label", { autoAlpha: 0, y: 10, duration: 0.36, ease: "power2.in" }, "out")
          .to(".en-title", { autoAlpha: 0, y: -14, letterSpacing: "0.11em", filter: "blur(7px)", duration: 0.5, ease: "power2.in" }, "out+=0.04")
          .to(".hairline", { autoAlpha: 0, scaleX: 0, duration: 0.44, ease: "power2.in" }, "out+=0.1")
          .to(".char", {
            autoAlpha: 0,
            yPercent: -28,
            scale: 0.98,
            filter: "blur(10px)",
            duration: 0.56,
            stagger: 0.035,
            ease: "power2.in"
          }, "out+=0.1")
          .to(".brand-line", { autoAlpha: 0, y: -10, duration: 0.36, ease: "power2.in" }, "out+=0.06")
          .to(".orb", { "--orb-scale": 0.88, "--orb-small-scale": 0.72, "--orb-rotate": "0deg", "--orb-alpha": 0.62, duration: 0.82, ease: "power2.inOut" }, "out")
          .to({}, { duration: 0.74 });
      }

      if (initWebGL()) {
        resize();
        requestAnimationFrame(render);
      }
      window.addEventListener("resize", resize, { passive: true });

      if (document.readyState === "complete") {
        reveal();
      } else {
        window.addEventListener("load", reveal, { once: true });
        setTimeout(reveal, 1800);
      }
    })();
  </script>
</body>
</html>
